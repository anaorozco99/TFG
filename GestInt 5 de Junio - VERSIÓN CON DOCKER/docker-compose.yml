# GestInt — Dunder Mifflin Paper Company
# Levanta la app con: docker compose up -d
# Luego abre: http://localhost:8080/instalar.php  (una sola vez)
# App en:     http://localhost:8080

services:

  web:
    build: .
    container_name: gestint_web
    ports:
      - "8080:80"
    volumes:
      - .:/var/www/html
      - uploads:/var/www/html/uploads
    environment:
      DB_HOST: db
    depends_on:
      db:
        condition: service_healthy
    restart: unless-stopped

  db:
    image: mysql:8.0
    container_name: gestint_db
    command: --default-authentication-plugin=mysql_native_password
    environment:
      MYSQL_ROOT_PASSWORD: ""
      MYSQL_ALLOW_EMPTY_PASSWORD: "yes"
      MYSQL_DATABASE: gestint
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "--silent"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  db_data:
  uploads:
