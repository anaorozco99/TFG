# ============================================================
# GestInt — Configuración de seguridad Apache (httpd.conf)
# Añadir estas líneas al httpd.conf de XAMPP
# Ruta: C:/xampp/apache/conf/httpd.conf
# ============================================================

# Ocultar la versión de Apache y del SO en las cabeceras
ServerTokens Prod
ServerSignature Off

# Deshabilitar TRACE (evita ataques XST)
TraceEnable Off

# Cabeceras de seguridad globales (requiere mod_headers)
<IfModule mod_headers.c>
    Header always set X-Content-Type-Options "nosniff"
    Header always set X-Frame-Options "SAMEORIGIN"
    Header always set X-XSS-Protection "1; mode=block"
    Header always set Referrer-Policy "strict-origin-when-cross-origin"
    # Fuerza HTTPS si se activa SSL (descomentar en producción)
    # Header always set Strict-Transport-Security "max-age=31536000; includeSubDomains"
</IfModule>

# Deshabilitar acceso a archivos de punto (.htaccess, .env, etc.)
<FilesMatch "^\.">
    Require all denied
</FilesMatch>

# ============================================================
# HTTPS con certificado autofirmado en XAMPP (local)
# ============================================================
# 1. Asegúrate de que mod_ssl esté activo en httpd.conf:
#    LoadModule ssl_module modules/mod_ssl.so
#    Include conf/extra/httpd-ssl.conf
#
# 2. En httpd-ssl.conf, el certificado ya está preconfigurado:
#    SSLCertificateFile "conf/ssl.crt/server.crt"
#    SSLCertificateKeyFile "conf/ssl.key/server.key"
#
# 3. Acceder por: https://localhost/GestInt/
#
# 4. Para forzar HTTPS (redirigir HTTP → HTTPS), añadir en .htaccess:
#    RewriteEngine On
#    RewriteCond %{HTTPS} off
#    RewriteRule ^ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
# ============================================================
